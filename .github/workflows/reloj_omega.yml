name: Reloj Despertador Omega (Ciclo Humano V17)
on:
  schedule:
    # Horarios UTC aproximados para simular Mañana (13:00), Tarde (18:00) y Noche (23:00)
    # Esto evita el patrón robótico de "medianoche exacta".
    - cron: '0 13,18,23 * * *' 
  workflow_dispatch: # Botón de Pánico Manual

permissions:
  contents: write # 🛡️ CRÍTICO: Permiso de escritura para la Bóveda

jobs:
  trabajo_del_obrero:
    runs-on: ubuntu-24.04
    steps:
      - name: 🎒 Despliegue de Mochila (Checkout Full-Depth)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Recupera toda la historia para comparativa de evolución

      - name: 🧹 Expurgación Heurística de Disco (Defensa Anti-Exhaustion)
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/julia* /usr/local/.ghcup "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force

      - name: 🐍 Configuración de Entorno (Python 3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🛡️ Inyección Criptográfica del Motor Táctico (Brave Browser)
        run: |
          sudo apt update && sudo apt install -y curl gnupg
          sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main" | sudo tee /etc/apt/sources.list.d/brave-browser-release.list
          sudo apt update
          sudo apt install -y brave-browser xvfb wireguard-tools resolvconf curl

      - name: 🌐 Aprovisionamiento WARP SOCKS5 (Sin Secuestro de Red)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ bookworm main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos proxy port 40000
          warp-cli --accept-tos connect
          sleep 5

      - name: 🛠️ Resolución de SO e Inyección de Herramientas (SRE PDF Fix)
        run: |
          echo "[SRE] Instalando dependencias criptográficas en el núcleo de Ubuntu..."
          sudo apt-get update -yq
          sudo apt-get install -yq --no-install-recommends build-essential libnss3 libnspr4 libnss3-tools '^libtinfo[0-9]+$' ffmpeg aria2
          
          python -m pip install --upgrade pip
          echo "[SRE] Escaneando repositorio en busca de archivo de requerimientos..."
          REQ_FILE=$(find . -type f -iname "*requirements*.txt" | head -n 1)
          if [ -n "$REQ_FILE" ]; then
            pip install -r "$REQ_FILE"
          else
            pip install -U --pre "yt-dlp[default,curl-cffi]" google-genai pillow bgutil-ytdlp-pot-provider
          fi

      - name: ⚙️ Motor YouTube Generador BotGuard (Docker)
        run: |
          docker run -d --name proveedor-tokens-youtube --memory="1024m" --cpus="1.0" -p 4416:4416 --restart always ghcr.io/jim60105/bgutil-pot:latest server --host 0.0.0.0 --port 4416

      - name: 🐳 Motor TikTok Falsificador de Firmas (Docker Seguro)
        run: |
          git clone https://github.com/carcabot/tiktok-signature.git /tmp/tiktok-signature
          cd /tmp/tiktok-signature
          docker compose up --detach --wait
          echo "✅ Motor TikTok operativo localmente"

      - name: 🩺 Control SRE Verificación de Salud de Puertos y Túnel
        run: |
          sleep 10
          curl -s http://127.0.0.1:4416/ > /dev/null || (echo "❌ Falla Motor YouTube" && exit 1)
          curl -s http://127.0.0.1:8080/health > /dev/null || echo "⚠️ Advertencia: Puerto TikTok no respondió instantáneamente."
          curl -s --socks5-hostname 127.0.0.1:40000 https://cloudflare.com/cdn-cgi/trace | grep -q "warp=on" || echo "⚠️ Advertencia: Túnel WARP tardando en enrutar."
          echo "✅ Diagnóstico Completo: Sistemas listos para operar."

      - name: 🧹 Purga de VFS en RAM (Defensa Anti-OOM)
        run: |
          sudo bash -c 'sync; echo 3 > /proc/sys/vm/drop_caches'

      - name: ⚡ Descubrimiento Heurístico Seguro y Ejecución en Entorno Aislado
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
          GEMINI_KEY_2: ${{ secrets.GEMINI_KEY_2 }}
          GEMINI_KEY_3: ${{ secrets.GEMINI_KEY_3 }}
          GEMINI_KEY_4: ${{ secrets.GEMINI_KEY_4 }}
          GEMINI_KEY_5: ${{ secrets.GEMINI_KEY_5 }}
          SOCKS5_TUNNEL: "socks5h://127.0.0.1:40000"
          NO_PROXY: "127.0.0.1,localhost,::1"
        run: |
          # Inicialización de Defensas de Entorno CI/CD
          # Abortar pipeline en códigos de salida anómalos, expansión de variables vacías y fallos de sub-procesos
          set -euo pipefail
          echo "SRE INIT: Inicializando orquestador de descubrimiento heurístico híbrido..."
          TARGET_FILE=""

          # FASE 1: HEURÍSTICA DE ADN (Identificación Semántica y Contenido Estructural)
          echo "========================================================================="
          echo "Fase de Extracción Semántica: Auditando Inodos para firma 'ExtractorEvasivoTikTok'..."
          while IFS= read -r -d '' file; do
            TARGET_FILE="$file"
            break # Optimización I/O de rendimiento O(1) tan pronto se localiza la huella
          done < <(find . -type f -name "*.py" -exec grep -lZ "class ExtractorEvasivoTikTok:" {} +)

          # FASE 2: HEURÍSTICA DE METADATOS (Identificación por Volumen Físico de Hardware)
          echo "========================================================================="
          if [ -z "$TARGET_FILE" ]; then
            echo "Excepción de validación estructural (Fase 1 desierta). Conmutando a Análisis Volumétrico de Metadatos..."
            while IFS=$'\t' read -r -d '' size file; do
              TARGET_FILE="$file"
              break
            done < <(find . -type f -name "*.py" -printf "%s\t%p\0" | sort -z -nr)
          fi

          # COMPUERTA FINAL: Validación Transaccional Terminal de Variables Críticas
          echo "========================================================================="
          if [ -z "$TARGET_FILE" ]; then
            echo "FALLO LETAL DEL SISTEMA: Arquitectura base desintegrada. Incapacidad operativa en la identificación del inodo objetivo principal (.py)." >&2
            exit 1
          fi
          echo "SRE RESOLUCIÓN: Cadena de bloques procesada. Despacho focal validado a -> '$TARGET_FILE'"

          # VECTOR DE EJECUCIÓN HEADLESS Y BLOQUEO DE MANIPULACIÓN (Ejecución Terminal)
          echo "========================================================================="
          echo "Desplegando instanciación X Virtual Framebuffer Server y enrutando sub-capas gráficas concurrentes..."
          xvfb-run -a python "$TARGET_FILE"
          
      - name: 💾 Persistencia de Datos (Auto-Commit)
        run: |
          git config --local user.email "ascorp_bot@github.com"
          git config --local user.name "Obrero Omega Bot"
          git add ASCORP_KNOWLEDGE_VAULT/ || true
          if ! git diff --staged --quiet; then
            git commit -m "🧠 SINC V16: Nuevos Hallazgos $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ CAMBIOS GUARDADOS EN LA BÓVEDA."
          else
            echo "💤 Nada nuevo en este turno. El obrero sigue vigilando."
          fi

      - name: 🚚 Envío Crítico a Google Drive (SRE Blindado)
        if: always()
        env:
          DRIVE_URL: ${{ secrets.DRIVE_WEBHOOK_URL }}
          SECURE_TOKEN: "OMEGA_2026_SECURE_AUTH"
        run: |
          sudo apt-get update -yq && sudo apt-get install -yq jq
          find ASCORP_KNOWLEDGE_VAULT -name "*.md" -mmin -60 | while read file; do
            filename=$(basename "$file")
            echo "Enviando $filename a la Bóveda Segura..."
            
            # [SRE] Streaming Directo de Disco a Red (Evita desbordamiento de RAM/Bash)
            jq -Rs --arg fn "$filename" --arg tok "$SECURE_TOKEN" '{"filename": $fn, "token": $tok, "content": .}' "$file" | \
            curl -s -L "$DRIVE_URL" -H "Content-Type: text/plain" -d @-
            
            # [SRE] Pausa táctica de medio segundo para no asfixiar la API de Google
            sleep 0.5
          done
