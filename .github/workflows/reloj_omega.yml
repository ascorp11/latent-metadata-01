name: Reloj Despertador Omega (Ciclo Humano V17)
on:
  schedule:
    # Horarios UTC aproximados para simular Mañana (13:00), Tarde (18:00) y Noche (23:00)
    # Esto evita el patrón robótico de "medianoche exacta".
    - cron: '0 13,18,23 * * *' 
  workflow_dispatch: # Botón de Pánico Manual

permissions:
  contents: write # 🛡️ CRÍTICO: Permiso de escritura para la Bóveda

jobs:
  trabajo_del_obrero:
    runs-on: ubuntu-24.04
    steps:
      - name: 🎒 Despliegue de Mochila (Checkout Full-Depth)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Recupera toda la historia para comparativa de evolución

      - name: 🐍 Configuración de Entorno (Python 3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🛡️ Inyección Criptográfica del Motor Táctico (Brave Browser)
        run: |
          sudo apt update && sudo apt install -y curl gnupg
          sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main" | sudo tee /etc/apt/sources.list.d/brave-browser-release.list
          sudo apt update
          sudo apt install -y brave-browser xvfb wireguard-tools resolvconf curl

      - name: 🌐 Setup Cloudflare WARP (Evasión de ASN Azure)
        timeout-minutes: 2
        run: |
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          ./wgcf register --accept-tos
          ./wgcf generate
          sudo cp wgcf-profile.conf /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          echo "🌐 IP Pública Enmascarada (WARP):"
          curl -s https://ifconfig.me

      - name: 🛠️ Inyección de Herramientas (Arqueología Digital)
        run: |
          python -m pip install --upgrade pip
          pip install nodriver curl_cffi yt-dlp google-genai pillow bgutil-ytdlp-pot-provider

      - name: 🍪 Inyección de Credenciales (Cookies)
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: |
          echo "$YOUTUBE_COOKIES" > cookies.txt
          echo "" >> cookies.txt
          echo "$TIKTOK_COOKIES" >> cookies.txt

      - name: ⚙️ Motor YouTube: Generador BotGuard (Rust)
        run: |
          wget https://github.com/jim60105/bgutil-ytdlp-pot-provider-rs/releases/latest/download/bgutil-pot-linux-x86_64
          chmod +x bgutil-pot-linux-x86_64
          sudo mv bgutil-pot-linux-x86_64 /usr/local/bin/bgutil-pot
          bgutil-pot server --host 127.0.0.1 --port 4416 &
          sleep 3
          curl -s http://127.0.0.1:4416 || (echo "❌ Error: Motor Rust falló" && exit 1)
          echo "✅ Motor YouTube operativo en puerto 4416"  

      - name: 🐳 Motor TikTok: Falsificador de Firmas (Docker)
        run: |
          git clone https://github.com/carcabot/tiktok-signature.git
          cd tiktok-signature
          docker compose up -d
          sleep 10
          docker ps | grep tiktok-signature || (echo "❌ Error: Motor Docker falló" && exit 1)
          echo "✅ Motor TikTok operativo localmente"

      - name: ⚡ Ejecución Obrero V21.0 (Modo Autónomo & Sigilo)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
          GEMINI_KEY_2: ${{ secrets.GEMINI_KEY_2 }}
          GEMINI_KEY_3: ${{ secrets.GEMINI_KEY_3 }}
          GEMINI_KEY_4: ${{ secrets.GEMINI_KEY_4 }}
          GEMINI_KEY_5: ${{ secrets.GEMINI_KEY_5 }}
          GEMINI_KEY_6: ${{ secrets.GEMINI_KEY_6 }}
        run: xvfb-run -a python obrero_omega.py

      - name: 💾 Persistencia de Datos (Auto-Commit)
        run: |
          git config --local user.email "ascorp_bot@github.com"
          git config --local user.name "Obrero Omega Bot"
          git add ASCORP_KNOWLEDGE_VAULT/*
          if ! git diff --staged --quiet; then
            git commit -m "🧠 SINC V16: Nuevos Hallazgos $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ CAMBIOS GUARDADOS EN LA BÓVEDA."
          else
            echo "💤 Nada nuevo en este turno. El obrero sigue vigilando."
          fi

      - name: 🚚 Envío Crítico a Google Drive
        if: always()
        env:
          DRIVE_URL: ${{ secrets.DRIVE_WEBHOOK_URL }}
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          find ASCORP_KNOWLEDGE_VAULT -name "*.md" -mmin -60 | while read file; do
            filename=$(basename "$file")
            content=$(cat "$file")
            echo "Enviando $filename a Google Drive..."
            curl -L -X POST "$DRIVE_URL" \
              -H "Content-Type: application/json" \
              -d "{\"filename\": \"$filename\", \"content\": $(echo \"$content\" | jq -Rs .)}"
          done
